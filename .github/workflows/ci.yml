name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Set environment variables
      run: |
        echo "DATABASE_URL=sqlite:///./test.db" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

    - name: Train Model
      run: |
        python datasets/train.py | tee training_output.txt

    - name: Upload Model Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-artifacts
        path: ml_artifacts/


    - name: Run Tests
      run: |
        pytest --maxfail=1 --disable-warnings -q --tb=short | tee pytest_output.txt

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results
        path: pytest_output.txt

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/churn-api:latest .

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/churn-api:latest

    - name: Summary
      run: |
        echo "## CI/CD Pipeline Report" >> $GITHUB_STEP_SUMMARY

        echo "### Build Information" >> $GITHUB_STEP_SUMMARY
        echo "- Trigger: Push to main branch" >> $GITHUB_STEP_SUMMARY
        echo "- Environment: Ubuntu Latest (GitHub Actions Runner)" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Execution" >> $GITHUB_STEP_SUMMARY
        echo "- Test Framework: Pytest" >> $GITHUB_STEP_SUMMARY
        echo "- Status: All test cases passed successfully" >> $GITHUB_STEP_SUMMARY
        echo "- API endpoints (Rules + ML) validated" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ML Model Metrics" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        cat training_output.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Containerization" >> $GITHUB_STEP_SUMMARY
        echo "- Docker image built successfully" >> $GITHUB_STEP_SUMMARY
        echo "- Image tagged using DockerHub repository" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Deployment Readiness" >> $GITHUB_STEP_SUMMARY
        echo "- Image pushed to DockerHub" >> $GITHUB_STEP_SUMMARY
        echo "- Ready for containerized deployment" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Overall Status" >> $GITHUB_STEP_SUMMARY
        echo "Pipeline completed successfully with DevOps and MLOps stages executed without errors." >> $GITHUB_STEP_SUMMARY

    - name: Generate YAML Report
      run: |
        echo "build_info:" > report.yaml
        echo "  trigger: push" >> report.yaml
        echo "  branch: main" >> report.yaml
        echo "  timestamp: $(date)" >> report.yaml
        echo "test_results:" >> report.yaml
        echo "  framework: pytest" >> report.yaml
        echo "  status: success" >> report.yaml
        echo "  endpoints_validated:" >> report.yaml
        echo "    - /predict" >> report.yaml
        echo "    - /ml_predict" >> report.yaml
        echo "    - /ml_batch_predict" >> report.yaml
        echo "containerization:" >> report.yaml
        echo "  image: ${{ secrets.DOCKERHUB_USERNAME }}/churn-api:latest" >> report.yaml
        echo "  status: pushed" >> report.yaml

    - name: Upload YAML Report
      uses: actions/upload-artifact@v4
      with:
        name: pipeline-report-yaml
        path: report.yaml